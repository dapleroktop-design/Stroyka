<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ПрофиРемонт - Запись</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a1a, #e65c00);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px;
            max-width: 400px;
            width: 100%;
        }
        h2 { color: white; text-align: center; }
        input, select {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 15px;
            background: #ffb300;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        .success {
            display: none;
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 15px;
            margin-top: 15px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔨 Запись на ремонт</h2>
        <form id="form">
            <input type="text" id="name" placeholder="Имя" required>
            <input type="tel" id="phone" placeholder="Телефон" required>
            <select id="service" required>
                <option value="">Услуга</option>
                <option value="Укладка кафеля">Укладка кафеля</option>
                <option value="Укладка плитки">Укладка плитки</option>
                <option value="Стяжка напольная">Стяжка напольная</option>
                <option value="Гипсокартон">Гипсокартон</option>
                <option value="Монтаж канализации">Монтаж канализации</option>
            </select>
            <input type="date" id="date" required>
            <input type="time" id="time" required>
            <button type="submit">📌 ЗАПИСАТЬСЯ</button>
        </form>
        <div class="success" id="success">✅ Заявка отправлена!</div>
    </div>

    <script>
        const form = document.getElementById('form');
        const successDiv = document.getElementById('success');
        
        // ТВОЯ ПОЧТА (сюда будут приходить заявки)
        const EMAIL = 'твоя_почта@gmail.com'; // ⚠️ ЗАМЕНИ НА СВОЮ ПОЧТУ
        
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const service = document.getElementById('service').value;
            const date = document.getElementById('date').value;
            const time = document.getElementById('time').value;
            
            const subject = `Заявка от ${name}`;
            const body = `Имя: ${name}%0AТелефон: ${phone}%0AУслуга: ${service}%0AДата: ${date}%0AВремя: ${time}`;
            
            window.location.href = `mailto:${EMAIL}?subject=${subject}&body=${body}`;
            
            form.style.display = 'none';
            successDiv.style.display = 'block';
        });
        
        document.getElementById('date').min = new Date().toISOString().split('T')[0];
    </script>
</body>
  </html>
